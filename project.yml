name: InterviewerApp
options:
  bundleIdPrefix: com.dogfood.interviewer
  deploymentTarget:
    iOS: "17.0"
packages:
  LiveKit:
    url: https://github.com/livekit/client-sdk-swift
    from: "2.6.0"
targets:
  InterviewerApp:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Resources/Info.plist
      properties:
        NSMicrophoneUsageDescription: "用于进行语音模拟面试"
        UIBackgroundModes: [audio]
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dogfood.interviewer.app
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: LiveKit
        product: LiveKit
  InterviewerAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: InterviewerApp
  InterviewerAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.dogfood.interviewer.app.uitests
    dependencies:
      - target: InterviewerApp
schemes:
  InterviewerApp:
    build:
      targets:
        InterviewerApp: all
        InterviewerAppTests: [test]
        InterviewerAppUITests: [test]
    test:
      targets:
        - InterviewerAppTests
        - InterviewerAppUITests
